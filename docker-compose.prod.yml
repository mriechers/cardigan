# Production deployment — pulls pre-built images from GHCR.
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Requires:
#   - Secret files in ./secrets/ (one value per file, no trailing newline)
#   - docker login to ghcr.io (see Task 7 in the plan)
#   - Optional: CORS_ORIGINS and DOCKER_CONFIG in .env for non-secret config

services:
  api:
    image: ghcr.io/mriechers/cardigan-api:latest
    ports:
      - "8100:8000"
    environment:
      - DATABASE_PATH=/data/db/dashboard.db
      - OUTPUT_DIR=/data/output
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      - TRANSCRIPTS_DIR=/data/transcripts
      - LANGFUSE_BASE_URL=https://us.cloud.langfuse.com
      - CARDIGAN_VERSION=${CARDIGAN_VERSION:-v4.2}
    secrets:
      - openrouter_api_key
      - airtable_api_key
      - langfuse_public_key
      - langfuse_secret_key
      - google_drive_credentials
    volumes:
      - db-data:/data/db
      - output-data:/data/output
      - transcript-data:/data/transcripts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  worker:
    image: ghcr.io/mriechers/cardigan-worker:latest
    environment:
      - DATABASE_PATH=/data/db/dashboard.db
      - OUTPUT_DIR=/data/output
      - TRANSCRIPTS_DIR=/data/transcripts
      - LANGFUSE_BASE_URL=https://us.cloud.langfuse.com
      - CARDIGAN_VERSION=${CARDIGAN_VERSION:-v4.2}
      - DIARIZATION_SERVICE_URL=http://diarization:8000
    secrets:
      - openrouter_api_key
      - airtable_api_key
      - langfuse_public_key
      - langfuse_secret_key
    volumes:
      - db-data:/data/db
      - output-data:/data/output
      - transcript-data:/data/transcripts
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  web:
    image: ghcr.io/mriechers/cardigan-web:latest
    ports:
      - "3100:3000"
    environment:
      - CARDIGAN_API_KEY=${CARDIGAN_API_KEY:-}
    depends_on:
      - api
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: unless-stopped

  mcp:
    image: ghcr.io/mriechers/cardigan-api:latest
    command: ["python", "-m", "mcp_server.server"]
    ports:
      - "8180:8080"
    environment:
      - MCP_TRANSPORT=http
      - EDITORIAL_API_URL=http://api:8000
      - DATABASE_PATH=/data/db/dashboard.db
      - EDITORIAL_OUTPUT_DIR=/data/output
      - EDITORIAL_TRANSCRIPTS_DIR=/data/transcripts
    secrets:
      - openrouter_api_key
      - airtable_api_key
      - langfuse_public_key
      - langfuse_secret_key
    volumes:
      - db-data:/data/db
      - output-data:/data/output
      - transcript-data:/data/transcripts
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - mcp
    restart: unless-stopped

  diarization:
    image: ghcr.io/mriechers/cardigan-diarization:latest
    environment:
      - WHISPER_MODEL_SIZE=base
      - HF_TOKEN_FILE=/run/secrets/hf_token
    secrets:
      - hf_token
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    profiles:
      - diarization
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    profiles:
      - tunnel
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Set DOCKER_CONFIG in .env if Docker runs as non-root user
      # (e.g., DOCKER_CONFIG=/home/ubuntu/.docker)
      - ${DOCKER_CONFIG:-/root/.docker}/config.json:/config.json:ro
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=30
      # Only update containers with the watchtower.enable=true label
      - WATCHTOWER_LABEL_ENABLE=true
    restart: unless-stopped

secrets:
  openrouter_api_key:
    file: ./secrets/openrouter_api_key
  airtable_api_key:
    file: ./secrets/airtable_api_key
  langfuse_public_key:
    file: ./secrets/langfuse_public_key
  langfuse_secret_key:
    file: ./secrets/langfuse_secret_key
  hf_token:
    file: ./secrets/hf_token
  google_drive_credentials:
    file: ./secrets/google_drive_credentials

volumes:
  db-data:
  output-data:
  transcript-data:
