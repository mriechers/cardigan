worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ---- Remote-preview http-scope config (real_ip + auth rate-limit zone) ----
    # Rendered by the container entrypoint ONLY when the htpasswd secret is
    # present; expands to empty otherwise, so a dormant image is behaviorally
    # identical to the LAN-only image shipped today. See Dockerfile.web.
    ${PREVIEW_HTTP_CONF}

    server {
        listen 3000;
        server_name _;

        # Allow large file uploads (matches API's 50MB limit)
        client_max_body_size 50m;

        root /usr/share/nginx/html;
        index index.html;

        # WebSocket upgrade for /api/ws/
        location /api/ws/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-API-Key "${CARDIGAN_API_KEY}";
            proxy_read_timeout 86400;
        }

        # API proxy
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-API-Key "${CARDIGAN_API_KEY}";
        }

        # MCP Streamable HTTP endpoint (optional — for Claude Desktop via Docker)
        # Uses variable + resolver so nginx starts even when mcp service is not running
        location /mcp/ {
            resolver 127.0.0.11 valid=30s;
            set $mcp_upstream http://mcp:8080;
            proxy_pass $mcp_upstream/mcp/;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Connection '';
            # Streaming support for server-initiated events
            chunked_transfer_encoding on;
            proxy_read_timeout 3600;
        }

        # SPA fallback — serve index.html for all other routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }

    # ---- Hardened remote-preview vhost (listen 3001, Tailscale Funnel target) ----
    # Rendered by the container entrypoint ONLY when the htpasswd secret is
    # present; expands to empty otherwise. When empty, nothing listens on 3001
    # and the image is byte-for-byte equivalent in behavior to today. See
    # Dockerfile.web (the block body lives in preview-server.conf.template).
    ${PREVIEW_SERVER_CONF}
}
