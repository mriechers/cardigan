worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 3000;
        server_name _;

        # Allow large file uploads (matches API's 50MB limit)
        client_max_body_size 50m;

        root /usr/share/nginx/html;
        index index.html;

        # WebSocket upgrade for /api/ws/
        location /api/ws/ {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-API-Key "${CARDIGAN_API_KEY}";
            proxy_read_timeout 86400;
        }

        # API proxy
        location /api/ {
            proxy_pass http://api:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-API-Key "${CARDIGAN_API_KEY}";
        }

        # MCP SSE endpoint (optional — for Claude Desktop via Docker)
        # Uses variable + resolver so nginx starts even when mcp service is not running
        location /mcp/ {
            resolver 127.0.0.11 valid=30s;
            set $mcp_upstream http://mcp:8080;
            proxy_pass $mcp_upstream$request_uri;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # SSE requires chunked transfer encoding
            chunked_transfer_encoding on;
        }

        # SPA fallback — serve index.html for all other routes
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
