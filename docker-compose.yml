services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8100:8000"
    environment:
      - DATABASE_PATH=/data/db/dashboard.db
      - OUTPUT_DIR=/data/output
      - CORS_ORIGINS=http://localhost:3100
      - TRANSCRIPTS_DIR=/data/transcripts
      - LANGFUSE_BASE_URL=https://us.cloud.langfuse.com
      - CARDIGAN_VERSION=${CARDIGAN_VERSION:-v4.1}
    secrets:
      - openrouter_api_key
      - airtable_api_key
      - langfuse_public_key
      - langfuse_secret_key
      - google_drive_credentials
    volumes:
      - db-data:/data/db
      - output-data:/data/output
      - ./transcripts:/data/transcripts
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/system/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - DATABASE_PATH=/data/db/dashboard.db
      - OUTPUT_DIR=/data/output
      - TRANSCRIPTS_DIR=/data/transcripts
      - LANGFUSE_BASE_URL=https://us.cloud.langfuse.com
      - CARDIGAN_VERSION=${CARDIGAN_VERSION:-v4.1}
      - DIARIZATION_SERVICE_URL=http://diarization:8000
    secrets:
      - openrouter_api_key
      - airtable_api_key
      - langfuse_public_key
      - langfuse_secret_key
    volumes:
      # NOTE: SQLite shared via volume between api + worker. WAL mode handles
      # concurrent access adequately for low-throughput workloads. Consider
      # PostgreSQL if write contention becomes an issue.
      - db-data:/data/db
      - output-data:/data/output
      - ./transcripts:/data/transcripts
      - ./config:/app/config
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3100:3000"
    environment:
      - CARDIGAN_API_KEY=${CARDIGAN_API_KEY:-}
    depends_on:
      - api

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["python", "-m", "mcp_server.server"]
    ports:
      - "8180:8080"
    environment:
      - MCP_TRANSPORT=http
      - EDITORIAL_API_URL=http://api:8000
      - DATABASE_PATH=/data/db/dashboard.db
      - EDITORIAL_OUTPUT_DIR=/data/output
      - EDITORIAL_TRANSCRIPTS_DIR=/data/transcripts
    secrets:
      - openrouter_api_key
      - airtable_api_key
      - langfuse_public_key
      - langfuse_secret_key
    volumes:
      - db-data:/data/db
      - output-data:/data/output
      - ./transcripts:/data/transcripts
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - mcp
    restart: unless-stopped

  diarization:
    build:
      context: ./diarization
    environment:
      - WHISPER_MODEL_SIZE=base
      - HF_TOKEN_FILE=/run/secrets/hf_token
    secrets:
      - hf_token
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    profiles:
      - diarization
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_started
    profiles:
      - tunnel
    restart: unless-stopped

secrets:
  openrouter_api_key:
    file: ./secrets/openrouter_api_key
  airtable_api_key:
    file: ./secrets/airtable_api_key
  langfuse_public_key:
    file: ./secrets/langfuse_public_key
  langfuse_secret_key:
    file: ./secrets/langfuse_secret_key
  hf_token:
    file: ./secrets/hf_token
  google_drive_credentials:
    file: ./secrets/google_drive_credentials

volumes:
  db-data:
  output-data:
