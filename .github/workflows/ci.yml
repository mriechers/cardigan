name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "20"

jobs:
  lint-python:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install lint tools
        run: pip install -r requirements-dev.txt
      - name: Ruff check
        run: ruff check .
      - name: Black check
        run: black --check .

  lint-frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: ESLint
        run: cd web && npm run lint

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    env:
      OPENROUTER_API_KEY: sk-ci-dummy-not-real
      AIRTABLE_API_KEY: pat-ci-dummy-not-real
      LANGFUSE_PUBLIC_KEY: pk-lf-ci-dummy
      LANGFUSE_SECRET_KEY: sk-lf-ci-dummy
      LANGFUSE_HOST: https://localhost
      DATABASE_PATH: ./ci-test.db
      TESTING: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Create required directories
        run: mkdir -p OUTPUT transcripts logs
      - name: Run database migrations
        run: alembic upgrade head
      - name: Run tests
        # Per-test timeout (pytest-timeout) guards against a single hung test stalling
        # the job: that test is killed and reported as a failure, so a real hang turns
        # CI red instead of being masked. The old `timeout 60` + swallow-exit-2/124 hack
        # is gone now that the mid-suite hang (#102) and the teardown KeyboardInterrupt
        # leak are fixed — the suite exits 0 cleanly.
        run: pytest --tb=short -q --timeout=60 --timeout-method=thread

  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: TypeScript compile + Vite build
        run: cd web && npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: web/dist/
          retention-days: 7

  migration-check:
    name: DB Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Alembic migrations
        run: alembic upgrade head
      - name: Verify tables created
        run: |
          python3 -c "
          import sqlite3
          conn = sqlite3.connect('dashboard.db')
          tables = [t[0] for t in conn.execute(\"SELECT name FROM sqlite_master WHERE type='table'\").fetchall()]
          print(f'Migration created {len(tables)} tables: {tables}')
          assert len(tables) >= 4, f'Expected at least 4 tables, got {len(tables)}: {tables}'
          conn.close()
          "

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version from git tags
        id: version
        run: |
          python3 -m pip install --quiet setuptools_scm
          VERSION=$(python3 -m setuptools_scm)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_EDITORIAL_ASSISTANT=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build Worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: false
          build-args: |
            SETUPTOOLS_SCM_PRETEND_VERSION_FOR_EDITORIAL_ASSISTANT=${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: false
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  version-consistency:
    name: Version Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check pyproject / package.json / git tag agree on release line
        run: python3 scripts/check_versions.py
