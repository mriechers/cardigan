name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    name: Build Docker Images
    runs-on: ubuntu-latest
    env:
      DEPLOY_SHA: ${{ github.sha }}
      REGISTRY: ghcr.io
      IMAGE_BASE: ghcr.io/${{ github.repository_owner }}/editorial-assistant
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-api:latest
            ${{ env.IMAGE_BASE }}-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-web:latest
            ${{ env.IMAGE_BASE }}-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Placeholder for future deployment to a VM or cloud target.
